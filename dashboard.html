<script>
  function setPage(page, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    if (el) el.classList.add('active');
    const content = document.querySelector('.content');
    const profilSection = document.getElementById('profil-edit-section');
    if (page === 'profil') {
      if(content) content.style.display = 'none';
      if(profilSection) profilSection.style.display = 'block';
    } else {
      if(content) content.style.display = 'block';
      if(profilSection) profilSection.style.display = 'none';
      if (page !== 'dashboard') {
        const t = document.getElementById('toast');
        const m = document.getElementById('toast-msg');
        if(t&&m){m.textContent='Page bientôt disponible !';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
      }
    }
  }
  async function saveProfil() {
    const S='https://chzffktwscvwpewbswhr.supabase.co';
    const K='sb_publishable_XMNY_eg_3lIjdQSGUoy3zQ_vk2t50gW';
    const getCookie=n=>document.cookie.split('; ').reduce((r,v)=>{const p=v.split('=');return p[0]===n?decodeURIComponent(p[1]):r},null);
    const token=getCookie('cz_token')||localStorage.getItem('chantierzen_token');
    const uStr=getCookie('cz_user')||localStorage.getItem('chantierzen_user');
    if(!token||!uStr)return;
    const user=JSON.parse(uStr);
    const p={prenom:document.getElementById('edit-prenom')?.value||'',nom:document.getElementById('edit-nom')?.value||'',telephone:document.getElementById('edit-tel')?.value||'',metier:document.getElementById('edit-metier')?.value||'',ville:document.getElementById('edit-ville')?.value||'',description:document.getElementById('edit-desc')?.value||''};
    const res=await fetch(`${S}/rest/v1/artisans?id=eq.${user.id}`,{method:'PATCH',headers:{'Content-Type':'application/json','apikey':K,'Authorization':`Bearer ${token}`},body:JSON.stringify(p)});
    if(res.ok){const t=document.getElementById('toast');const m=document.getElementById('toast-msg');if(t&&m){m.textContent='✅ Profil sauvegardé !';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}const u=document.getElementById('user-name');if(u)u.textContent=p.prenom+' '+p.nom;}
  }
</script>
